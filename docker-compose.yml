services:
  mongo:
    image: mongo:7
    container_name: api-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - backend

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: umdr-api
    container_name: umdr-api
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      JWT_SECRET: ${JWT_SECRET}
      MONGO_URI: ${MONGO_URI}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}
      ARGON2_MEMORY_COST: ${ARGON2_MEMORY_COST}
      ARGON2_TIME_COST: ${ARGON2_TIME_COST}
      ARGON2_PARALLELISM: ${ARGON2_PARALLELISM}
      RUST_LOG: info
    ports:
      - "3000:3000"
    networks:
      - backend

volumes:
  mongo_data:
    driver: local
    driver_opts:
      type: none
      device: /home/deploy/docker-volumes/mongo-data
      o: bind

networks:
  backend:
